<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#101214" />
<title>SkyLang Engine</title>

<link rel="stylesheet" href="style.css?v=5-ui">
<link rel="manifest" href="manifest.json">
</head>

<body>
<main class="app-shell">
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true">Σ</div>
      <div>
        <h1>SkyLang Engine</h1>
        <p id="statusText" class="status-text" aria-live="polite"></p>
      </div>
    </div>

    <label class="language-control">
      <span data-i18n="language">語言</span>
      <select id="langSelect">
        <option value="zh">中文</option>
        <option value="en">English</option>
      </select>
    </label>
  </header>

  <section class="workspace" aria-label="SkyLang translator">
    <section class="panel input-panel">
      <div class="panel-heading">
        <div>
          <p class="eyebrow" data-i18n="inputEyebrow">Source</p>
          <h2 data-i18n="inputTitle">輸入</h2>
        </div>
        <button id="clearBtn" class="ghost-button" type="button" data-i18n="clear">清除</button>
      </div>

      <textarea id="inputBox" placeholder="ta wa mu ru" spellcheck="false" autocomplete="off"></textarea>

      <div class="meta-row">
        <span id="inputCount">0</span>
        <span id="validationText"></span>
      </div>

      <div class="sample-row" aria-label="Samples">
        <button class="sample-chip" type="button" data-sample="ta wa mu ru">ta wa mu ru</button>
        <button class="sample-chip" type="button" data-sample="mi no ra">mi no ra</button>
        <button class="sample-chip" type="button" data-sample="ka li tu">ka li tu</button>
      </div>

      <button id="convertBtn" class="primary-button" type="button" data-i18n="convert">轉換</button>
    </section>

    <section class="panel output-panel">
      <div class="panel-heading">
        <div>
          <p class="eyebrow" data-i18n="outputEyebrow">Result</p>
          <h2 data-i18n="outputTitle">輸出</h2>
        </div>
        <div id="scoreBadge" class="score-badge">0%</div>
      </div>

      <div class="output-stack">
        <div>
          <span class="field-label" data-i18n="glyphLabel">字形</span>
          <output id="output" class="glyph-output"></output>
        </div>
        <div>
          <span class="field-label" data-i18n="phoneticLabel">發音</span>
          <output id="phoneticOutput" class="phonetic-output"></output>
        </div>
      </div>

      <div class="action-row">
        <button id="copyBtn" class="secondary-button" type="button" data-i18n="copy">複製</button>
        <button id="speakBtn" class="secondary-button" type="button" data-i18n="speak">朗讀</button>
      </div>
    </section>
  </section>
</main>

<script src="config.js?v=5-ui"></script>
<script src="validator.js?v=5-ui"></script>
<script src="syllable.js?v=5-ui"></script>
<script src="glyphMap.js?v=5-ui"></script>
<script src="enn.js?v=5-ui"></script>
<script src="engine.js?v=5-ui"></script>
<script src="tts.js?v=5-ui"></script>
<script src="i18n.js?v=5-ui"></script>
<script src="app.js?v=5-ui"></script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js")
    .then(() => console.log("SW registered"))
    .catch(err => console.log("SW failed", err));
}
</script>
</body>
</html>
